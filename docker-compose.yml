services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend1
    networks:
      - todo-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    environment:
      - API_URL=/api
    networks:
      - todo-network

  backend1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:8080}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
      - SQLITE_DB_LOCATION=/app/data/todo.db
      - SESSION_DB_LOCATION=/app/data/sessions.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db:
