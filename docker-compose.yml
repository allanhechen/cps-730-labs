services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3
    networks:
      - todo-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    environment:
      - API_URL=/api
    networks:
      - todo-network

  backend1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=http://16.58.204.159:8080
      - BACKEND_URL=http://16.58.204.159:8080
      - SQLITE_DB_LOCATION=/app/data/todo.db
      - SESSION_DB_LOCATION=/app/data/sessions.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

  backend2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=http://ec2-18-226-88-223.us-east-2.compute.amazonaws.com:8080
      - BACKEND_URL=http://ec2-18-226-88-223.us-east-2.compute.amazonaws.com:8080
      - SQLITE_DB_LOCATION=/app/data/todo.db
      - SESSION_DB_LOCATION=/app/data/sessions.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

  backend3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=http://ec2-18-226-88-223.us-east-2.compute.amazonaws.com:8080
      - BACKEND_URL=http://ec2-18-226-88-223.us-east-2.compute.amazonaws.com:8080
      - SQLITE_DB_LOCATION=/app/data/todo.db
      - SESSION_DB_LOCATION=/app/data/sessions.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db:
