services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3
    networks:
      - todo-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    environment:
      - API_URL=/api
    networks:
      - todo-network

  backend1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=http://localhost:8080
      - SQLITE_DB_LOCATION=/app/data/todo.db
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

  backend2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=http://localhost:8080
      - SQLITE_DB_LOCATION=/app/data/todo.db
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

  backend3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3000
      - CLIENT_ORIGIN=http://localhost:8080
      - SQLITE_DB_LOCATION=/app/data/todo.db
    expose:
      - "3000"
    volumes:
      - todo-db:/app/data
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db: